

services:
  # ─── Next.js App ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: weblikefood:latest
    container_name: weblikefood_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - mysql
      - redis
    networks:
      - weblikefood_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── MySQL 8 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: weblikefood_mysql
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # Port 3306 không expose ra ngoài host — chỉ app nội bộ mới truy cập được
    networks:
      - weblikefood_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (for rate limiting / cache) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: weblikefood_redis
    restart: unless-stopped
    env_file:
      - .env.production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - weblikefood_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: weblikefood_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # Place your SSL certs here
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - weblikefood_net

  # ─── phpMyAdmin ────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: weblikefood_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
      MAX_EXECUTION_TIME: 600
      MEMORY_LIMIT: 512M
    depends_on:
      - mysql
    ports:
      - "127.0.0.1:8080:80"   # Chỉ bind localhost — KHÔNG mở ra internet
    networks:
      - weblikefood_net

volumes:
  mysql_data:
  redis_data:
  nginx_cache:

networks:
  weblikefood_net:
    driver: bridge
